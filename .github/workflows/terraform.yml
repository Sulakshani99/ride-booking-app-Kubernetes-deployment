name: Terraform Pipeline

on:
  pull_request:
    branches:
      - main

    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

  push:
    branches:
      - main

    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

  workflow_dispatch:
    inputs:
      action:
        description: Choose Terraform action
        required: true
        default: plan
        type: choice

        options:
          - plan
          - apply
          - destroy

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  TERRAFORM_DIRECTORY: terraform/environments/prod

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4

        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-terraform

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

        with:
          terraform_version: 1.6.0

      - name: Terraform format check
        working-directory: ${{ env.TERRAFORM_DIRECTORY }}

        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: ${{ env.TERRAFORM_DIRECTORY }}

        run: terraform init

      - name: Terraform validate
        working-directory: ${{ env.TERRAFORM_DIRECTORY }}

        run: terraform validate

      - name: Terraform plan
        if: |
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.action == 'plan'

        working-directory: ${{ env.TERRAFORM_DIRECTORY }}

        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD_PROD }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET_PROD }}
          TF_VAR_admin_password: ${{ secrets.ADMIN_PASSWORD_PROD }}

        run: terraform plan

      - name: Terraform apply
        if: |
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.action == 'apply'

        working-directory: ${{ env.TERRAFORM_DIRECTORY }}

        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD_PROD }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET_PROD }}
          TF_VAR_admin_password: ${{ secrets.ADMIN_PASSWORD_PROD }}

        run: terraform apply -auto-approve

      - name: Terraform destroy
        if: |
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.action == 'destroy'

        working-directory: ${{ env.TERRAFORM_DIRECTORY }}

        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD_PROD }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET_PROD }}
          TF_VAR_admin_password: ${{ secrets.ADMIN_PASSWORD_PROD }}

        run: terraform destroy -auto-approve