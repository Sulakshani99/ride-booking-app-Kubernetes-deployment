spring.application.name=ride-notification

server.port=8084

# Database Configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/ride_notification_db?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Sula@991215}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
