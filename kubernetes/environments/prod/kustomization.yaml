apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ../../base/ingress
  - ../../base/external-secrets
  - ../../base/autoscaling

patches:
  - path: patches/db-host-patch.yaml
  - path: patches/aws-serviceaccount-patch.yaml
  - path: patches/external-secrets-patch.yaml

images:
  - name: auth-service
    newName: 688978191806.dkr.ecr.us-east-1.amazonaws.com/prod-auth-service
    newTag: latest
  - name: ride-service
    newName: 688978191806.dkr.ecr.us-east-1.amazonaws.com/prod-ride-service
    newTag: latest
  - name: payment-service
    newName: 688978191806.dkr.ecr.us-east-1.amazonaws.com/prod-payment-service
    newTag: latest
  - name: notification-service
    newName: 688978191806.dkr.ecr.us-east-1.amazonaws.com/prod-notification-service
    newTag: latest

