apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ridebooking-alerts
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
    - name: ridebooking.rules
      rules:
        - alert: AuthServiceDown
          expr: |
            absent(up{namespace="ridebooking", service="auth-service"})
            or
            up{namespace="ridebooking", service="auth-service"} == 0
          for: 2m
          labels:
            severity: critical
            service: auth-service
          annotations:
            summary: auth-service is down
            description: Prometheus cannot scrape auth-service for more than 2 minutes.

        - alert: RideServiceDown
          expr: |
            absent(up{namespace="ridebooking", service="ride-service"})
            or
            up{namespace="ridebooking", service="ride-service"} == 0
          for: 2m
          labels:
            severity: critical
            service: ride-service
          annotations:
            summary: ride-service is down
            description: Prometheus cannot scrape ride-service for more than 2 minutes.

        - alert: PaymentServiceDown
          expr: |
            absent(up{namespace="ridebooking", service="payment-service"})
            or
            up{namespace="ridebooking", service="payment-service"} == 0
          for: 2m
          labels:
            severity: critical
            service: payment-service
          annotations:
            summary: payment-service is down
            description: Prometheus cannot scrape payment-service for more than 2 minutes.

        - alert: NotificationServiceDown
          expr: |
            absent(up{namespace="ridebooking", service="notification-service"})
            or
            up{namespace="ridebooking", service="notification-service"} == 0
          for: 2m
          labels:
            severity: critical
            service: notification-service
          annotations:
            summary: notification-service is down
            description: Prometheus cannot scrape notification-service for more than 2 minutes.

            