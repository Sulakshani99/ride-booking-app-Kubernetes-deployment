apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ride-service-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - ridebooking

  selector:
    matchLabels:
      app: ride-service
      
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s