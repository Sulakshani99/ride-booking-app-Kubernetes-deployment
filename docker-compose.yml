services:
  mysql:
    image: mysql:8.0
    container_name: ride-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Sula@991215}
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10


  auth-service:
    build:
      context: ./auth-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-Sula@991215}
    ports:
      - "8081:8081"

  ride-service:
    build:
      context: ./ride-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-Sula@991215}
    ports:
      - "8082:8082"

  payment-service:
    build:
      context: ./payment-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-Sula@991215}
    ports:
      - "8083:8083"

  notification-service:
    build:
      context: ./notification-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-Sula@991215}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_SES_FROM: ${AWS_SES_FROM:-noreply@email.tasheedevops.me}
    ports:
      - "8084:8084"